name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o family_medicine_report_tracker_android.zip -d .
          ls -la

      - name: Find project dir
        run: |
          PROJECT_DIR=$(dirname "$(find . -name gradlew | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Using project dir: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Fix gradlew permissions + line endings
        run: |
          sed -i 's/\r$//' "$PROJECT_DIR/gradlew"
          chmod +x "$PROJECT_DIR/gradlew"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Locate APK
        run: |
          find . -type f -name "*.apk" | sed 's/^/APK: /'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            **/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
