name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip family_medicine_report_tracker_android.zip -d .
          ls -la
          ls -la family_medicine_report_tracker_android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: family_medicine_report_tracker_android
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: family_medicine_report_tracker_android/app/build/outputs/apk/debug/app-debug.apk
